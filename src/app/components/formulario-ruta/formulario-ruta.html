<div class="form-container">
  <h2>Planificador de Rutas Moteras 🏍️</h2>
  
  <form [formGroup]="formularioRuta" (ngSubmit)="onSubmit()">
    <div class="input-group">
      <label for="origen">Punto de Partida:</label>
      <input id="origen" type="text" formControlName="origen" placeholder="Ej: Madrid">
    </div>

    <div class="input-group">
      <label for="destino">Destino Final:</label>
      <input id="destino" type="text" formControlName="destino" placeholder="Ej: Cuenca">
    </div>

    <div class="input-group">
      <label>Tipo de ruta:</label>
      <select formControlName="intensidad">
        <option value="scenic">Paisajística (Tranquila)</option>
        <option value="curvy">Muy Revirada (Curvas)</option>
        <option value="adventure">Aventura (Carreteras secundarias)</option>
      </select>
    </div>

    <button type="submit" [disabled]="formularioRuta.invalid">Generar Ruta Mágica</button>
  </form>
</div>
