<div class="form-container">
  <h2>RUTAS MOTERAS 🏍️</h2>

  <form [formGroup]="formularioRuta" (ngSubmit)="onSubmit()">
    <div class="input-group">
      <label for="origen">Punto de Partida</label>
      <input id="origen" type="text" formControlName="origen" placeholder="Ej: Madrid">
    </div>

    <div class="input-group">
      <label for="origen">Punto de Partida</label>
      <div style="display: flex; gap: 10px;">
        <input id="origen" type="text" formControlName="origen" placeholder="Ej: Madrid" style="flex: 1;">
        <button type="button" (click)="obtenerUbicacion()" style="width: auto; padding: 14px; background-color: #333;" title="Usar mi ubicación actual">
          🎯
        </button>
      </div>
    </div>

    <div class="input-group">
      <label for="destino">Destino Final</label>
      <input id="destino" type="text" formControlName="destino" placeholder="Ej: Valencia">
    </div>

    <div class="input-group">
      <label>Estilo de ruta</label>
      <select formControlName="intensidad">
        <option value="scenic">📸 Paisajística (Tranquila)</option>
        <option value="curvy">🐍 Modo Curvas (Deportiva)</option>
        <option value="adventure">🗺️ Aventura (Secundarias)</option>
      </select>
    </div>

    <div class="input-group">
      <label>Duración / Nivel de desvío</label>
      <select formControlName="duracion">
        <option value="corta">⏱️ Directa (Prioriza llegar, pero por secundarias)</option>
        <option value="media">⚖️ Equilibrada (Desvíos moderados)</option>
        <option value="larga">🌅 Día completo (Ruta muy larga y enrevesada)</option>
      </select>
    </div>

    <button type="submit" [disabled]="formularioRuta.invalid || cargando">
      {{ cargando ? 'Calculando...' : 'Generar Ruta Mágica' }}
    </button>
  </form>

  <!-- SECCIÓN DE CARGA -->
  @if (cargando) {
    <div class="loading-text">
      <p>Trazando curvas y evitando autovías...</p>
    </div>
  }
  <div *ngIf="rutaGenerada && !cargando" class="resultado-card">
    <h3>¡Tu ruta está lista!</h3>
    <p><strong>El veredicto experto:</strong><br> {{ rutaGenerada.explanation }}</p>

    <div *ngIf="rutaGenerada.waypoints.length > 0">
      <h4>Puntos de control:</h4>
      <ul>
        <li *ngFor="let punto of rutaGenerada.waypoints">{{ punto }}</li>
      </ul>
    </div>

    <a [href]="urlMapa" target="_blank" class="btn-maps">
      📍 Abrir ruta en Google Maps
    </a>
  </div>
</div>
